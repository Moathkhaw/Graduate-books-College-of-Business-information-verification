<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحث عن أرقام الخريجين</title>
    <!-- استدعاء مكتبة Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- استدعاء خط Cairo للغة العربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية متدرجة أنيقة */
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- حاوية التطبيق -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 transform transition-all">
        
        <!-- الترويسة -->
        <div class="text-center mb-8">
            <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">بوابة الخريجين</h1>
            <p class="text-sm text-gray-500 mt-2">استعلم عن رقمك الجامعي أو رقم الخريج بسهولة</p>
        </div>

        <!-- حقل البحث -->
        <div class="space-y-4">
            <div>
                <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-1">اسم الخريج</label>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="أدخل الاسم الثلاثي أو الرباعي..." 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
                    onkeypress="handleKeyPress(event)"
                >
            </div>
            
            <button 
                onclick="searchStudent()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                بحث
            </button>
        </div>

        <!-- منطقة عرض النتائج -->
        <div id="resultContainer" class="mt-6 hidden">
            <!-- سيتم حقن النتيجة هنا بواسطة جافاسكربت -->
        </div>

    </div>

    <script>
        // ==========================================
        // إعدادات ربط جوجل شيت مباشر
        // ==========================================
        const sheetId = '1cYu_slumZsofITCnCs29HsmPIGmhPgIRzeS8r2OVEEI'; // معرف ملفك
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        
        let graduatesData = [];
        let sheetHeaders = [];
        let isLoading = true;

        // دالة جلب البيانات من جوجل شيت عند تحميل الصفحة
        async function fetchSheetData() {
            const btn = document.querySelector('button');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = 'جاري التحميل...'; // تغيير نص الزر أثناء التحميل
            btn.disabled = true;

            try {
                const response = await fetch(sheetUrl);
                const text = await response.text();
                // تنظيف الاستجابة للحصول على البيانات البرمجية فقط
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);

                // استخراج عناوين الأعمدة من الصف الأول في الإكسل
                sheetHeaders = data.table.cols.map(col => col.label || '');

                // استخراج صفوف البيانات
                graduatesData = data.table.rows.map((row, index) => {
                    let rowData = {};
                    // إضافة رقم الصف (البيانات تبدأ من الصف 2 لأن الصف 1 للعناوين)
                    rowData['رقم_الصف_في_الملف'] = index + 2;

                    row.c.forEach((cell, cellIndex) => {
                        const colName = sheetHeaders[cellIndex] || `عمود ${cellIndex + 1}`;
                        rowData[colName] = cell && cell.v !== null ? cell.v : '';
                    });
                    return rowData;
                });

                isLoading = false;
                btn.innerHTML = originalBtnText; // إعادة الزر لشكله الطبيعي
                btn.disabled = false;
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
                showError("تعذر الاتصال بملف الإكسل. يرجى التأكد من أن الملف 'متاح لأي شخص لديه الرابط'.");
                btn.innerHTML = 'خطأ في الاتصال';
            }
        }

        // تشغيل جلب البيانات فوراً عند فتح الموقع
        fetchSheetData();

        // دالة تفعيل البحث عند الضغط على زر Enter
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isLoading) {
                searchStudent();
            }
        }

        // دالة البحث الرئيسية
        function searchStudent() {
            if (isLoading) return; // منع البحث إذا كانت البيانات قيد التحميل

            const searchInput = document.getElementById('searchInput').value.trim();
            const resultContainer = document.getElementById('resultContainer');

            // إظهار منطقة النتائج
            resultContainer.classList.remove('hidden');

            // التحقق من إدخال نص
            if (searchInput === '') {
                showError('الرجاء إدخال اسم الخريج للبحث!');
                return;
            }

            // استخدام filter لجلب *جميع* النتائج المطابقة بدلاً من أول نتيجة فقط
            const results = graduatesData.filter(student => {
                return Object.values(student).some(value => 
                    String(value).toLowerCase().includes(searchInput.toLowerCase())
                );
            });

            if (results.length > 0) {
                showSuccess(results);
            } else {
                showError('عذراً، لم يتم العثور على بيانات مطابقة. يرجى التأكد من التهجئة.');
            }
        }

        // دالة لعرض رسالة النجاح والبيانات لجميع النتائج
        function showSuccess(students) {
            const resultContainer = document.getElementById('resultContainer');
            
            // تحديد عنوان الرسالة بناءً على عدد النتائج
            const headerText = students.length === 1 
                ? 'تم العثور على البيانات بنجاح' 
                : `تم العثور على ${students.length} نتائج مطابقة`;

            let htmlContent = `
                <div class="bg-green-50 border border-green-200 rounded-lg p-5 text-right shadow-sm animate-fade-in-up">
                    <h3 class="text-green-800 font-bold mb-4 flex items-center gap-2 border-b border-green-200 pb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        ${headerText}
                    </h3>
                    <div class="space-y-6">
            `;

            // المرور على كل نتيجة وبناء التصميم الخاص بها
            students.forEach((student, index) => {
                let detailsHTML = '';
                let studentName = '';
                let studentNumber = student['رقم_الصف_في_الملف']; // جلب رقم الصف من الملف

                // تصنيف البيانات لإبراز الاسم والرقم
                for (const [key, value] of Object.entries(student)) {
                    if (key === 'رقم_الصف_في_الملف') continue; // تخطي لأنه سيعرض في المربع الأزرق

                    if (value !== '') {
                        if (key.includes('اسم') || key.includes('Name')) {
                            studentName = value;
                        } else {
                            // باقي البيانات الإضافية
                            detailsHTML += `<p class="flex justify-between border-b border-gray-100 pb-2 mb-2"><span class="font-bold text-gray-600">${key}:</span> <span class="text-gray-800 text-left font-semibold">${value}</span></p>`;
                        }
                    }
                }

                // إذا لم يتم تحديد الاسم كعمود منفصل، نعرض ما بحث عنه المستخدم
                if (!studentName) {
                    studentName = document.getElementById('searchInput').value;
                }

                // إضافة خط فاصل إذا كان هناك أكثر من نتيجة (لا نضيفه للنتيجة الأولى)
                const separator = index > 0 ? `<hr class="my-6 border-green-300 border-t-2 border-dashed">` : '';

                htmlContent += `
                    ${separator}
                    <div class="result-item">
                        <!-- عرض الاسم -->
                        <div class="bg-white p-3 rounded-lg border border-green-100 shadow-sm mb-4">
                            <p class="text-xs text-gray-400 mb-1 font-bold">الاسم</p>
                            <p class="text-lg font-bold text-gray-800">${studentName}</p>
                        </div>
                        
                        <!-- عرض الرقم بشكل بارز جداً -->
                        <div class="bg-blue-50 p-6 rounded-xl border-2 border-blue-200 text-center shadow-inner">
                            <p class="text-sm text-blue-600 mb-2 font-bold">رقم الخريج في الملف (رقم الصف)</p>
                            <p class="text-4xl font-black text-blue-700 tracking-widest">${studentNumber}</p>
                        </div>

                        <!-- عرض باقي البيانات إن وجدت -->
                        ${detailsHTML ? `
                        <div class="mt-4 bg-white p-4 rounded-lg border border-green-100 shadow-sm">
                            <h4 class="text-xs font-bold text-gray-400 mb-3 border-b pb-2">معلومات إضافية</h4>
                            ${detailsHTML}
                        </div>
                        ` : ''}
                    </div>
                `;
            });

            // إغلاق الوسوم
            htmlContent += `
                    </div>
                </div>
            `;

            resultContainer.innerHTML = htmlContent;
        }

        // دالة لعرض رسالة الخطأ
        function showError(message) {
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-right">
                    <h3 class="text-red-800 font-bold mb-1 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                        تنبيه
                    </h3>
                    <p class="text-red-600 text-sm">${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
